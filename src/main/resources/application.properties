#  Cell Offer Queue Service 

spring.application.name=cell-offer-queue-service

# Server
server.port=8080

# Maximum number of offers held per H3 cell queue before the lowest-priority
# offer is evicted (or the incoming one is dropped).
cell.offer.max-queue-size=100

# How often (in ms) the flush scheduler drains each cell queue.
cell.offer.flush-interval-ms=500

#  PushGateway 
# Address of the PushGateway gRPC server (used by OfferPushClient).
push.gateway.host=localhost
push.gateway.grpc-port=9090

# PushGateway server settings (used by PushGatewayServer and Dispatcher).
push.gateway.max-queue-size-per-user=200
push.gateway.default-ttl-ms=30000
push.gateway.dispatch-interval-ms=50
push.gateway.dispatch-batch-size=10
push.gateway.heartbeat-interval-ms=10000
push.gateway.heartbeat-timeout-ms=30000

#  Actuator 
# Expose health, info, metrics, and prometheus endpoints.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

#  Logging 
logging.level.j143.github.celloffer=INFO
logging.level.j143.github.pushgateway=INFO
logging.level.j143.github.pushclient=INFO
