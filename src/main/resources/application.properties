# ── Cell Offer Queue Service ─────────────────────────────────────────────────

spring.application.name=cell-offer-queue-service

# Server
server.port=8080

# Maximum number of offers held per H3 cell queue before the lowest-priority
# offer is evicted (or the incoming one is dropped).
cell.offer.max-queue-size=100

# How often (in ms) the flush scheduler drains each cell queue.
cell.offer.flush-interval-ms=500

# ── Actuator ─────────────────────────────────────────────────────────────────
# Expose health, info, metrics, and prometheus endpoints.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.uber.celloffer=INFO
